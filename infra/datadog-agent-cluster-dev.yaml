# datadog-agent.yaml
kind: 'DatadogAgent'
apiVersion: 'datadoghq.com/v2alpha1'
metadata:
  name: 'datadog'
spec:
  global:
    site: 'datadoghq.com'
    credentials:
      apiSecret:
        secretName: 'datadog-secret'
        keyName: 'api-key'
    clusterName: 'the-franklin-project'
    tags:
      - 'env:development'
      - 'project:franklin'
      # add more as needed here
  features:
    logCollection:
      enabled: true
      containerCollectAll: true
##
