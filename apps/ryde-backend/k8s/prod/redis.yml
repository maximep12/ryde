---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryde-redis
spec:
  selector:
    matchLabels:
      app: ryde-redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ryde-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2.1
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: ryde-redis
spec:
  ports:
    - port: 6379
  selector:
    app: ryde-redis
