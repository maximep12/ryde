name: ryde
services:
  postgres:
    image: postgres:18
    container_name: ryde-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ryde-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: ryde-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ryde-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-insight:
    image: redis/redisinsight:latest
    container_name: ryde-redis-insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    volumes:
      - redis_insight_data:/data
    networks:
      - ryde-network
    depends_on:
      - redis

  bull-board:
    image: deadly0/bull-board:latest
    platform: linux/amd64
    container_name: ryde-bull-board
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_PREFIX: bull
    networks:
      - ryde-network
    depends_on:
      - redis
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3

  localstack:
    image: localstack/localstack:latest
    container_name: ryde-localstack
    restart: unless-stopped
    ports:
      - '4566:4566'
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/localstack-init.sh
    networks:
      - ryde-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  s3-browser:
    image: cloudlena/s3manager
    ports:
      - '8080:8080'
    environment:
      ENDPOINT: localstack:4566
      USE_SSL: 'false'
      FORCE_PATH_STYLE: 'true'
      ACCESS_KEY_ID: test
      SECRET_ACCESS_KEY: test
      REGION: us-east-1
    depends_on:
      - localstack
    networks:
      - ryde-network

networks:
  ryde-network:
    driver: bridge
    name: ryde-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  localstack_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redis_insight_data:
    driver: local
