name: ryde
services:
  postgres:
    image: postgres:18
    container_name: ryde-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ryde-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: ryde-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ryde-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-insight:
    image: redis/redisinsight:latest
    container_name: ryde-redis-insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    volumes:
      - redis_insight_data:/data
    networks:
      - ryde-network
    depends_on:
      - redis

  bull-board:
    image: deadly0/bull-board:latest
    platform: linux/amd64
    container_name: ryde-bull-board
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_PREFIX: bull
    networks:
      - ryde-network
    depends_on:
      - redis
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ryde-network:
    driver: bridge
    name: ryde-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redis_insight_data:
    driver: local